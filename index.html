<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ qry.hub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- qry stack (no Shoelace: the hub uses no widgets) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry-ui.css">
    <link rel="stylesheet" href="qry-hub-theme.css">
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry.js"></script>

    <style>
        /* ─── App: hub (shared theme: qry-hub-theme.css) ────────────────── */
        main { width: min(1080px, 100%); }

        /* ── Source link (top-right corner) ──────────────────────────── */
        #src {
            position: fixed;
            top: 16px;
            right: 20px;
            font: 600 .8em var(--qry-font-mono);
            color: var(--qry-text-muted);
            text-decoration: none;
            transition: color .18s var(--qry-ease);
        }

        #src:hover, #src:focus-visible {
            color: var(--qry-blue);
            outline: none;
        }

        /* ── Search ──────────────────────────────────────────────────── */
        #search {
            display: block;
            width: min(420px, 100%);
            margin: 0 auto 36px;
            padding: 10px 16px;
            font: 1em var(--qry-font-mono);
            color: var(--qry-text);
            background: var(--qry-surface);
            border: 1px solid var(--qry-line-strong);
            border-radius: var(--qry-radius);
            outline: none;
            transition: border-color .18s var(--qry-ease), box-shadow .18s var(--qry-ease);
        }

        #search::placeholder { color: var(--qry-text-muted); opacity: .7; }

        #search:focus {
            border-color: var(--qry-blue);
            box-shadow: 0 0 0 3px var(--qry-blue-50);
        }

        /* ── Categories ──────────────────────────────────────────────── */
        .cat { margin-bottom: 36px; }

        .cat h2 {
            margin: 0 0 14px;
            font: 600 1em var(--qry-font-mono);
            color: var(--qry-text-muted);
        }

        .cat h2 .slash { color: var(--qry-blue); }

        .cat h2 .n {
            font-weight: 400;
            font-size: .8em;
            opacity: .7;
        }

        /* ── Card grid ───────────────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            background: var(--qry-surface);
            border: 1px solid var(--qry-line);
            border-radius: var(--qry-radius);
            text-decoration: none;
            color: inherit;
            transition: transform .18s var(--qry-ease), box-shadow .18s var(--qry-ease), border-color .18s var(--qry-ease);
        }

        .card:hover, .card:focus-visible {
            transform: translateY(-3px);
            border-color: var(--qry-blue);
            box-shadow: var(--qry-shadow-lg);
            outline: none;
        }

        .card .icon { font-size: 1.8em; line-height: 1; }

        .card .name {
            font: 600 1.05em var(--qry-font-mono);
            color: var(--qry-blue);
        }

        .card .desc {
            font-size: .92em;
            color: var(--qry-text-muted);
        }

        #empty {
            color: var(--qry-text-muted);
            font-family: var(--qry-font-mono);
        }

        /* ── Status line ─────────────────────────────────────────────── */
        footer {
            margin-top: auto;
            width: min(1080px, 100%);
            padding-top: 24px;
            font: .8em var(--qry-font-mono);
            color: var(--qry-text-muted);
        }

        footer a {
            color: var(--qry-text-muted);
            text-decoration: none;
            border-bottom: 1px solid var(--qry-line);
            transition: color .18s var(--qry-ease), border-color .18s var(--qry-ease);
        }

        footer a:hover, footer a:focus-visible {
            color: var(--qry-blue);
            border-color: var(--qry-blue);
            outline: none;
        }
    </style>
</head>
<body class="hub-app">
<a id="src" href="https://github.com/Bloechle/qry-hub" target="_blank" rel="noopener">[src]</a>

<header>
    <h1><span class="prompt">$</span> qry.hub<span class="caret"></span></h1>
    <p>Mes mini webapps — un point d'entrée unique.</p>
</header>

<main>
    <input id="search" type="search" placeholder="filtrer…" autofocus>

    <div id="cats"></div>
    <p id="empty" class="hidden">// aucune app ne correspond</p>
</main>

<footer>[qry.hub] · <span id="count">0</span> apps · MIT · <a href="https://github.com/Bloechle/qry-js" target="_blank" rel="noopener">qry.js</a></footer>

<script>
    // ── Déclare tes apps ici ──────────────────────────────────────────
    // Chaque app vit dans apps/<cat>/<name>/ — déclare-la avec sa catégorie.
    const CATS = [
        { key: 'edu',   icon: '🎓', label: 'edu' },
        { key: 'game',  icon: '🎮', label: 'game' },
        { key: 'lab',   icon: '🔬', label: 'lab' },
        { key: 'tools', icon: '🛠️', label: 'tools' }
    ];

    const APPS = [
        { cat: 'edu',   icon: '📊', name: 'algolive',  desc: 'Sorting algorithms, visualized step by step', url: 'apps/edu/algolive/index.html' },
        { cat: 'edu',   icon: '📐', name: 'trigolive', desc: 'Interactive unit circle — sin, cos, tan with exact values', url: 'apps/edu/trigolive/index.html' },
        { cat: 'edu',   icon: '🔤', name: 'namecards', desc: 'Printable first-name reading worksheets (PDF)', url: 'apps/edu/namecards/index.html' },
        { cat: 'edu',   icon: '⏱️', name: 'examtimer', desc: 'Fullscreen exam countdown with trilingual instructions', url: 'apps/edu/examtimer/index.html' },
        { cat: 'game',  icon: '🐍', name: 'snake',     desc: 'Classic neon snake — 8 levels, power-ups, combos', url: 'apps/game/snake/index.html' },
        { cat: 'game',  icon: '🏃', name: 'dodgerun',  desc: 'Neon 3D endless runner — jump, slide, dodge', url: 'apps/game/dodgerun/dodgerun.html' },
        { cat: 'game',  icon: '✨', name: 'singularity', desc: 'Grow a spark of energy — chain feeds, outrun antimatter', url: 'apps/game/singularity/index.html' },
        { cat: 'lab',   icon: '🎯', name: 'adaptlive', desc: 'Four adaptive threshold methods racing on a simulated observer', url: 'apps/lab/adaptlive/index.html' },
        { cat: 'lab',   icon: '📋', name: 'consentform', desc: 'CoPe Lab consent form — sign and export PDF', url: 'apps/lab/consentform/index.html' },
        { cat: 'tools', icon: '✒️', name: 'pdfsign',   desc: 'Sign and annotate any PDF — vector ink', url: 'apps/tools/pdfsign/index.html' },
        { cat: 'tools', icon: '📜', name: 'typstlive', desc: 'Fill fields — the Typst document re-typesets live', url: 'apps/tools/typstlive/index.html' },
        { cat: 'tools', icon: '🎨', name: 'paintpad',  desc: 'Quick sketches — brush, shapes, images', url: 'apps/tools/paintpad/index.html' }
    ];

    $.ready(() => {
        const cats = $('#cats');

        CATS.forEach(cat => {
            const apps = APPS.filter(a => a.cat === cat.key);
            if (!apps.length) return;

            const section = $.create('section', { class: 'cat' });

            const h2 = $.create('h2');
            h2.add($.create('span', { text: `${cat.icon} apps` }));
            h2.add($.create('span', { class: 'slash', text: '/' }));
            h2.add($.create('span', { text: cat.label }));
            h2.add($.create('span', { class: 'slash', text: '/' }));
            h2.add($.create('span', { class: 'n', text: ` ${apps.length}` }));
            section.add(h2);

            const grid = $.create('div', { class: 'grid' });
            apps.forEach(app => {
                const card = $.create('a', { class: 'card', href: app.url });
                card.data('search', `${cat.label} ${app.name} ${app.desc}`.toLowerCase());
                card.add($.create('div', { class: 'icon', text: app.icon }));
                card.add($.create('div', { class: 'name', text: app.name }));
                card.add($.create('div', { class: 'desc', text: app.desc }));
                card.mount(grid);
            });
            section.add(grid);
            section.mount(cats);
        });

        $('#count').text(APPS.length);

        const search = $('#search');
        search.on('input', () => {
            const q = search.val().trim().toLowerCase();
            let visible = 0;
            $.all('.card').forEach(card => {
                const match = card.data('search').includes(q);
                card.cls(match ? '-hidden' : 'hidden');
                if (match) visible++;
            });
            // Hide categories whose cards are all filtered out
            $.all('.cat').forEach(section => {
                const any = [...section.querySelectorAll('.card')].some(c => !c.cls('?hidden'));
                section.cls(any ? '-hidden' : 'hidden');
            });
            $('#empty').cls(visible ? 'hidden' : '-hidden');
        });
    });
</script>
</body>
</html>
