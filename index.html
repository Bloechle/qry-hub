<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ qry.hub</title>
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry@latest/qry.js"></script>
    <style>
        :root {
            --bg: #F2F4F7;
            --card: #FFFFFF;
            --ink: #1B2733;
            --muted: #5C6B7A;
            --accent: #0E7A5F;
            --accent-soft: #E3F2EC;
            --border: #E1E6EC;
            --radius: 12px;
            --mono: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font: 16px/1.5 system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        main {
            max-width: 1080px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ── Header : invite de commande ─────────────────────────────── */
        header h1 {
            font: 700 1.9em/1.2 var(--mono);
            margin: 0 0 6px;
        }

        header h1 .prompt { color: var(--accent); }

        header h1 .caret {
            display: inline-block;
            width: .55em;
            height: 1.05em;
            margin-left: 4px;
            background: var(--accent);
            vertical-align: text-bottom;
            animation: blink 1.1s steps(1) infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @media (prefers-reduced-motion: reduce) {
            header h1 .caret { animation: none; }
        }

        header p {
            margin: 0 0 28px;
            color: var(--muted);
        }

        /* ── Recherche ───────────────────────────────────────────────── */
        #search {
            width: 100%;
            max-width: 420px;
            padding: 10px 16px;
            margin-bottom: 36px;
            font: 1em var(--mono);
            color: var(--ink);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
        }

        #search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        /* ── Grille de cartes ────────────────────────────────────────── */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            color: inherit;
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
        }

        .card:hover, .card:focus-visible {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(14, 122, 95, .12);
            outline: none;
        }

        .card .icon { font-size: 1.8em; line-height: 1; }

        .card .name {
            font: 600 1.05em var(--mono);
            color: var(--accent);
        }

        .card .desc {
            font-size: .92em;
            color: var(--muted);
        }

        .hidden { display: none; }

        #empty {
            color: var(--muted);
            font-family: var(--mono);
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1><span class="prompt">$</span> qry.hub<span class="caret"></span></h1>
        <p>Mes mini webapps — un point d'entrée unique.</p>
    </header>

    <input id="search" type="search" placeholder="filtrer…" autofocus>

    <div id="grid"></div>
    <p id="empty" class="hidden">// aucune app ne correspond</p>
</main>

<script>
    // ── Déclare tes apps ici (exemples à remplacer) ──────────────────
    const APPS = [
        { icon: '🌍', name: 'globe',     desc: 'Horizon Overflow — globe orthographique', url: 'https://observablehq.com/@sugarcube/globe' },
        { icon: '📷', name: 'photos',    desc: 'Pipeline CR2 → JPEG et renommage par date', url: 'apps/photos/index.html' },
        { icon: '🃏', name: 'anki',      desc: 'Générateur de paquets Anki (.apkg)',       url: 'apps/anki/index.html' },
        { icon: '🧪', name: 'playground', desc: 'Bac à sable JS avec qry.js',              url: 'apps/playground/index.html' }
    ];

    $.ready(() => {
        const grid = $('#grid');

        APPS.forEach(app => {
            const card = $.create('a', { class: 'card', href: app.url });
            card.data('search', `${app.name} ${app.desc}`.toLowerCase());
            card.add($.create('div', { class: 'icon', text: app.icon }));
            card.add($.create('div', { class: 'name', text: app.name }));
            card.add($.create('div', { class: 'desc', text: app.desc }));
            card.mount(grid);
        });

        const search = $('#search');
        search.on('input', () => {
            const q = search.val().trim().toLowerCase();
            let visible = 0;
            $.all('.card').forEach(card => {
                const match = card.data('search').includes(q);
                card.cls(match ? '-hidden' : 'hidden');
                if (match) visible++;
            });
            $('#empty').cls(visible ? 'hidden' : '-hidden');
        });
    });
</script>
</body>
</html>
