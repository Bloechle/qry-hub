<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ qry.hub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry@1.0.0/qry.js"></script>
    <style>
        /* ═══ THEME — inline copy of /theme.css ═══════════════════════════
           Do not edit here: edit theme.css, then re-paste this block. ═══ */

        :root {
            --bg: #F4F7FB;
            --card: #FFFFFF;
            --ink: #0F1722;
            --muted: #5B6B7D;
            --accent: #0B6BCB;
            --accent-soft: #E3EEFA;
            --accent-glow: rgba(11, 107, 203, .25);
            --border: #DCE4ED;
            --ok: #15803D;
            --warn: #B45309;
            --err: #C2410C;
            --radius: 12px;
            --ring: 0 0 0 3px var(--accent-soft);
            --shadow-card: 0 8px 20px rgba(15, 23, 34, .05);
            --shadow-hover: 0 10px 24px rgba(11, 107, 203, .14);
            --ease: cubic-bezier(.2, .8, .2, 1);
            --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; }

        ::selection { background: var(--accent); color: #fff; }

        body {
            margin: 0;
            background: var(--bg);
            background-image: radial-gradient(rgba(11, 107, 203, .10) 1px, transparent 1px);
            background-size: 26px 26px;
            color: var(--ink);
            font: 16px/1.5 var(--sans);
        }

        /* ── Header: command prompt ──────────────────────────────────── */
        header h1 {
            font: 700 2.4em/1.2 var(--mono);
            letter-spacing: -.02em;
            margin: 0 0 6px;
        }

        header h1 .prompt { color: var(--accent); }

        header h1 .caret {
            display: inline-block;
            width: .55em;
            height: 1.05em;
            margin-left: 4px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            vertical-align: text-bottom;
            animation: blink 1.1s steps(1) infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @media (prefers-reduced-motion: reduce) {
            header h1 .caret { animation: none; }
        }

        header p { margin: 0; color: var(--muted); }

        /* ── Panel (main card) ───────────────────────────────────────── */
        #panel {
            width: min(var(--panel-w, 980px), 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            padding: 20px;
        }

        /* ── Controls (select, buttons) ──────────────────────────────── */
        select, button {
            font: 600 .95em var(--mono);
            color: var(--ink);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
        }

        select:hover, select:focus-visible, button:hover, button:focus-visible {
            border-color: var(--accent);
            box-shadow: var(--ring);
            outline: none;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ── Note (caption under the content) ────────────────────────── */
        .note {
            margin: 36px 0 28px;
            text-align: center;
            font: .9em var(--mono);
            color: var(--muted);
        }

        /* ── Metrics (stable grid, no layout shift) ──────────────────── */
        #metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
            gap: 8px;
        }

        .metric {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 10px;
            text-align: center;
        }

        .metric .label {
            display: block;
            font: 600 .65em var(--mono);
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
        }

        .metric .value {
            font: 600 .95em var(--mono);
            font-variant-numeric: tabular-nums;
            color: var(--ink);
            white-space: nowrap;
        }

        /* ═══ END THEME ═══════════════════════════════════════════════ */

        /* ─── App: hub ────────────────────────────────────────────────── */
        main {
            max-width: 1080px;
            margin: 0 auto;
            padding: 48px 24px 56px;
        }

        header p { margin-bottom: 28px; }

        /* ── Lien source (coin haut-droit) ───────────────────────────── */
        #src {
            position: fixed;
            top: 16px;
            right: 20px;
            font: 600 .8em var(--mono);
            color: var(--muted);
            text-decoration: none;
            transition: color .18s var(--ease);
        }

        #src:hover, #src:focus-visible {
            color: var(--accent);
            outline: none;
        }

        /* ── Recherche ───────────────────────────────────────────────── */
        #search {
            width: 100%;
            max-width: 420px;
            padding: 10px 16px;
            margin-bottom: 36px;
            font: 1em var(--mono);
            color: var(--ink);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
        }

        #search::placeholder { color: var(--muted); opacity: .7; }

        #search:focus {
            border-color: var(--accent);
            box-shadow: var(--ring);
        }

        /* ── Catégories ──────────────────────────────────────────────── */
        .cat { margin-bottom: 36px; }

        .cat h2 {
            margin: 0 0 14px;
            font: 600 1em var(--mono);
            color: var(--muted);
        }

        .cat h2 .slash { color: var(--accent); }

        .cat h2 .n {
            font-weight: 400;
            font-size: .8em;
            opacity: .7;
        }

        /* ── Grille de cartes ────────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            color: inherit;
            transition: transform .18s var(--ease), box-shadow .18s var(--ease), border-color .18s var(--ease);
        }

        .card:hover, .card:focus-visible {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: var(--shadow-hover);
            outline: none;
        }

        .card .icon { font-size: 1.8em; line-height: 1; }

        .card .name {
            font: 600 1.05em var(--mono);
            color: var(--accent);
        }

        .card .desc {
            font-size: .92em;
            color: var(--muted);
        }

        .hidden { display: none; }

        #empty {
            color: var(--muted);
            font-family: var(--mono);
        }

        /* ── Status line ─────────────────────────────────────────────── */
        footer {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 24px 32px;
            font: .8em var(--mono);
            color: var(--muted);
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            transition: color .18s var(--ease), border-color .18s var(--ease);
        }

        footer a:hover, footer a:focus-visible {
            color: var(--accent);
            border-color: var(--accent);
            outline: none;
        }
    </style>
</head>
<body>
<a id="src" href="https://github.com/Bloechle/qry-hub" target="_blank" rel="noopener">[src]</a>

<main>
    <header>
        <h1><span class="prompt">$</span> qry.hub<span class="caret"></span></h1>
        <p>Mes mini webapps — un point d'entrée unique.</p>
    </header>

    <input id="search" type="search" placeholder="filtrer…" autofocus>

    <div id="cats"></div>
    <p id="empty" class="hidden">// aucune app ne correspond</p>
</main>

<footer>[qry.hub] · <span id="count">0</span> apps · MIT · <a href="https://github.com/Bloechle/qry" target="_blank" rel="noopener">qry.js</a></footer>

<script>
    // ── Déclare tes apps ici ──────────────────────────────────────────
    // Chaque app vit dans apps/<cat>/<name>/ — déclare-la avec sa catégorie.
    const CATS = [
        { key: 'edu',   icon: '🎓', label: 'edu' },
        { key: 'game',  icon: '🎮', label: 'game' },
        { key: 'lab',   icon: '🔬', label: 'lab' },
        { key: 'tools', icon: '🛠️', label: 'tools' }
    ];

    const APPS = [
        { cat: 'edu',   icon: '📊', name: 'algolive',  desc: 'Sorting algorithms, visualized step by step', url: 'apps/edu/algolive/index.html' },
        { cat: 'edu',   icon: '📐', name: 'trigolive', desc: 'Interactive unit circle — sin, cos, tan with exact values', url: 'apps/edu/trigolive/index.html' },
        { cat: 'edu',   icon: '🔤', name: 'namecards', desc: 'Printable first-name reading worksheets (PDF)', url: 'apps/edu/namecards/index.html' },
        { cat: 'edu',   icon: '⏱️', name: 'examtimer', desc: 'Fullscreen exam countdown with trilingual instructions', url: 'apps/edu/examtimer/index.html' },
        { cat: 'game',  icon: '🐍', name: 'snake',     desc: 'Classic neon snake — 8 levels, power-ups, combos', url: 'apps/game/snake/index.html' },
        { cat: 'game',  icon: '🏃', name: 'dodgerun',  desc: 'Neon 3D endless runner — jump, slide, dodge', url: 'apps/game/dodgerun/dodgerun.html' },
        { cat: 'game',  icon: '✨', name: 'singularity', desc: 'Grow a spark of energy — chain feeds, outrun antimatter', url: 'apps/game/singularity/index.html' },
        { cat: 'lab',   icon: '🎯', name: 'adaptlive', desc: 'Four adaptive threshold methods racing on a simulated observer', url: 'apps/lab/adaptlive/index.html' },
        { cat: 'lab',   icon: '📋', name: 'consentform', desc: 'CoPe Lab consent form — sign and export PDF', url: 'apps/lab/consentform/index.html' },
        { cat: 'tools', icon: '✒️', name: 'pdfsign',   desc: 'Sign and annotate any PDF — vector ink', url: 'apps/tools/pdfsign/index.html' },
        { cat: 'tools', icon: '📜', name: 'typstlive', desc: 'Fill fields — the Typst document re-typesets live', url: 'apps/tools/typstlive/index.html' },
        { cat: 'tools', icon: '🎨', name: 'paintpad',  desc: 'Quick sketches — brush, shapes, images', url: 'apps/tools/paintpad/index.html' }
    ];

    $.ready(() => {
        const cats = $('#cats');

        CATS.forEach(cat => {
            const apps = APPS.filter(a => a.cat === cat.key);
            if (!apps.length) return;

            const section = $.create('section', { class: 'cat' });

            const h2 = $.create('h2');
            h2.add($.create('span', { text: `${cat.icon} apps` }));
            h2.add($.create('span', { class: 'slash', text: '/' }));
            h2.add($.create('span', { text: cat.label }));
            h2.add($.create('span', { class: 'slash', text: '/' }));
            h2.add($.create('span', { class: 'n', text: ` ${apps.length}` }));
            section.add(h2);

            const grid = $.create('div', { class: 'grid' });
            apps.forEach(app => {
                const card = $.create('a', { class: 'card', href: app.url });
                card.data('search', `${cat.label} ${app.name} ${app.desc}`.toLowerCase());
                card.add($.create('div', { class: 'icon', text: app.icon }));
                card.add($.create('div', { class: 'name', text: app.name }));
                card.add($.create('div', { class: 'desc', text: app.desc }));
                card.mount(grid);
            });
            section.add(grid);
            section.mount(cats);
        });

        $('#count').text(APPS.length);

        const search = $('#search');
        search.on('input', () => {
            const q = search.val().trim().toLowerCase();
            let visible = 0;
            $.all('.card').forEach(card => {
                const match = card.data('search').includes(q);
                card.cls(match ? '-hidden' : 'hidden');
                if (match) visible++;
            });
            // Hide categories whose cards are all filtered out
            $.all('.cat').forEach(section => {
                const any = [...section.querySelectorAll('.card')].some(c => !c.cls('?hidden'));
                section.cls(any ? '-hidden' : 'hidden');
            });
            $('#empty').cls(visible ? 'hidden' : '-hidden');
        });
    });
</script>
</body>
</html>
