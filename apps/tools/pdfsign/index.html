<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ pdf.sign</title>
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- qry stack: Shoelace (widgets) + qry-ui.css (tokens) + qry.js (core) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry-ui.css">
    <link rel="stylesheet" href="../../../qry-hub-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@1.17.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        /* ─── App: pdfsign (shared theme: ../../../qry-hub-theme.css) ──── */
        #panel { width: min(880px, 100%); padding: 20px; }

        #toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
        #toolbar .spacer { flex: 1; }
        #pageNav { display: none; align-items: center; gap: 6px; font: .85em var(--qry-font-mono); color: var(--qry-text-muted); }

        #drop {
            display: grid;
            place-items: center;
            min-height: 320px;
            border: 2px dashed var(--qry-line-strong);
            border-radius: var(--qry-radius);
            color: var(--qry-text-muted);
            font: .95em var(--qry-font-mono);
            text-align: center;
            padding: 20px;
            cursor: pointer;
            transition: border-color var(--qry-transition), background var(--qry-transition);
        }
        #drop:hover { border-color: var(--qry-blue); background: var(--qry-tint-soft); }

        #stage {
            position: relative;
            display: none;
            border: 1px solid var(--qry-line-strong);
            border-radius: var(--qry-radius);
            overflow: hidden;
            background: #8E9DAD;
        }
        #stage canvas { display: block; width: 100%; height: auto; }
        #inkCanvas { position: absolute; inset: 0; cursor: crosshair; touch-action: none; }
        #inkCanvas.placing { cursor: copy; }

        #hint { margin-top: 14px; text-align: center; font: .85em var(--qry-font-mono); color: var(--qry-text-muted); }
    </style>
</head>
<body class="hub-app">
<header>
    <h1><span class="prompt">$</span> pdf.sign<span class="caret"></span></h1>
    <p>Sign and annotate any PDF — ink and text are embedded as vectors.</p>
</header>

<div id="panel" class="qry-card qry-card-body">
    <div id="toolbar">
        <sl-button id="open" size="small">open PDF</sl-button>
        <input id="file" type="file" accept="application/pdf" hidden>
        <span id="pageNav">
            <sl-button id="prev" size="small">‹</sl-button>
            <span id="pageInfo">1 / 1</span>
            <sl-button id="next" size="small">›</sl-button>
        </span>
        <span class="spacer"></span>
        <sl-button id="text" size="small" disabled>text</sl-button>
        <sl-button id="date" size="small" disabled>date</sl-button>
        <sl-button id="undo" size="small" disabled>undo</sl-button>
        <sl-button id="clear" size="small" disabled>clear page</sl-button>
        <sl-button id="save" size="small" variant="primary" disabled>download</sl-button>
    </div>

    <div id="drop">drop a PDF here<br>— or use “open PDF” —<br><br>then sign with mouse, finger or pen</div>

    <div id="stage">
        <canvas id="pdfCanvas"></canvas>
        <canvas id="inkCanvas"></canvas>
    </div>

    <div id="hint">draw anywhere on the page · “text” / “date” then click to place</div>
</div>

<script type="module">
    import { prompt, toast, download, makeDropZone } from 'https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry-kit.js';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const SCALE = 1.5;                  // pdf.js render scale (canvas px per PDF pt)
    const INK_W = 2.5;                  // stroke width, canvas px
    const TEXT_PX = 16;                 // text size, canvas px

    // ═══ State ═══════════════════════════════════════════════════════════
    const app = {
        srcBytes: null,                 // original PDF bytes
        pdf: null,                      // pdf.js document
        page: 1,
        pages: 1,
        annots: {},                     // pageNum → { strokes: [[{x,y}…]], texts: [{text,x,y}], order: ['stroke'|'text'…] }
        pending: null                   // text waiting for a placement click
    };

    const pageAnnots = (n = app.page) =>
        app.annots[n] ??= { strokes: [], texts: [], order: [] };

    // ═══ Vector embedding (pure: PDFLib + bytes + annots in, bytes out) ══
    async function buildSignedPdf(srcBytes, annots, scale) {
        const { PDFDocument, StandardFonts, rgb } = PDFLib;
        const doc = await PDFDocument.load(srcBytes, { ignoreEncryption: true });
        const font = await doc.embedFont(StandardFonts.Helvetica);
        const black = rgb(0, 0, 0);

        for (const [num, a] of Object.entries(annots)) {
            if (!a.strokes.length && !a.texts.length) continue;
            const page = doc.getPage(num - 1);
            const { height } = page.getSize();

            for (const stroke of a.strokes) {
                const path = stroke
                    .map((p, i) => `${i ? 'L' : 'M'} ${(p.x / scale).toFixed(2)} ${(p.y / scale).toFixed(2)}`)
                    .join(' ');
                page.drawSvgPath(path, {
                    x: 0, y: height,                            // SVG y-down from the page top
                    borderColor: black,
                    borderWidth: INK_W / scale,
                    borderLineCap: PDFLib.LineCapStyle.Round
                });
            }

            for (const t of a.texts)
                page.drawText(t.text, {
                    x: t.x / scale, y: height - t.y / scale,
                    size: TEXT_PX / scale, font, color: black
                });
        }
        return doc.save();
    }

    // ═══ Rendering ═══════════════════════════════════════════════════════
    const pdfCanvas = $('#pdfCanvas');
    const inkCanvas = $('#inkCanvas');
    const pdfCtx = pdfCanvas.getContext('2d');
    const inkCtx = inkCanvas.getContext('2d');

    async function renderPage(num) {
        const page = await app.pdf.getPage(num);
        const vp = page.getViewport({ scale: SCALE });
        pdfCanvas.width = inkCanvas.width = vp.width;
        pdfCanvas.height = inkCanvas.height = vp.height;
        await page.render({ canvasContext: pdfCtx, viewport: vp }).promise;
        redrawOverlay();
        $('#pageInfo').text(`${app.page} / ${app.pages}`);
        $('#prev').disabled = app.page <= 1;
        $('#next').disabled = app.page >= app.pages;
    }

    function strokeStyle(ctx) {
        ctx.lineCap = ctx.lineJoin = 'round';
        ctx.lineWidth = INK_W;
        ctx.strokeStyle = '#000';
    }

    function redrawOverlay() {
        inkCtx.clearRect(0, 0, inkCanvas.width, inkCanvas.height);
        const a = pageAnnots();
        strokeStyle(inkCtx);
        for (const stroke of a.strokes) {
            inkCtx.beginPath();
            stroke.forEach((p, i) => i ? inkCtx.lineTo(p.x, p.y) : inkCtx.moveTo(p.x, p.y));
            inkCtx.stroke();
        }
        inkCtx.font = `${TEXT_PX}px Helvetica, Arial`;
        inkCtx.fillStyle = '#000';
        for (const t of a.texts) inkCtx.fillText(t.text, t.x, t.y);
    }

    // ═══ Flow ════════════════════════════════════════════════════════════
    async function openPdf(buf) {
        app.srcBytes = new Uint8Array(buf.slice(0));        // pdf.js may transfer the buffer
        app.pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        app.pages = app.pdf.numPages;
        app.page = 1;
        app.annots = {};
        app.pending = null;
        $('#drop').hide();
        $('#stage').css({ display: 'block' });
        $('#pageNav').css({ display: app.pages > 1 ? 'inline-flex' : 'none' });
        ['#text', '#date', '#undo', '#clear', '#save'].forEach(s => $(s).enable());
        await renderPage(1);
        toast(`PDF loaded — ${app.pages} page${app.pages > 1 ? 's' : ''}`, 'success', 1800);
    }

    async function loadPdfFile(f) {
        if (!f || f.type !== 'application/pdf') { toast('Not a PDF file', 'warn'); return; }
        openPdf(await f.arrayBuffer());
    }

    function armText(text) {
        app.pending = text;
        inkCanvas.cls('placing');
    }

    // ═══ Input ═══════════════════════════════════════════════════════════
    // CSS may scale the canvas: map pointer coords to canvas pixels
    const toCanvas = (e) => {
        const r = inkCanvas.getBoundingClientRect();
        return {
            x: (e.clientX - r.left) * inkCanvas.width / r.width,
            y: (e.clientY - r.top) * inkCanvas.height / r.height
        };
    };

    let drawing = false;
    let stroke = [];
    let last = null;

    inkCanvas.on('pointerdown', e => {
        const p = toCanvas(e);
        if (app.pending) {                                   // place pending text
            const a = pageAnnots();
            a.texts.push({ text: app.pending, x: p.x, y: p.y });
            a.order.push('text');
            app.pending = null;
            inkCanvas.cls('-placing');
            redrawOverlay();
            return;
        }
        drawing = true;
        stroke = [p];
        last = p;
        inkCanvas.setPointerCapture(e.pointerId);
        e.preventDefault();
    });

    inkCanvas.on('pointermove', e => {
        if (!drawing) return;
        for (const ev of (e.getCoalescedEvents?.() ?? [e])) {
            const p = toCanvas(ev);
            stroke.push(p);
            strokeStyle(inkCtx);
            inkCtx.beginPath();
            inkCtx.moveTo(last.x, last.y);
            inkCtx.lineTo(p.x, p.y);
            inkCtx.stroke();
            last = p;
        }
    });

    const endStroke = () => {
        if (drawing && stroke.length > 1) {
            const a = pageAnnots();
            a.strokes.push(stroke);
            a.order.push('stroke');
        }
        drawing = false;
        stroke = [];
    };

    inkCanvas.on('pointerup', endStroke);
    inkCanvas.on('pointercancel', endStroke);

    // ═══ Boot ════════════════════════════════════════════════════════════
    $.ready(() => {
        $('#open').on('click', () => $('#file').click());
        $('#drop').on('click', () => $('#file').click());
        $('#file').on('change', e => loadPdfFile(e.target.files[0]));

        makeDropZone(document.body, {
            label: 'Drop a PDF to sign',
            icon: 'pen-tool',
            onFiles: files => loadPdfFile(files.find(f => f.type === 'application/pdf') ?? files[0]),
        });

        $('#prev').on('click', async () => { if (app.page > 1) { app.page--; await renderPage(app.page); } });
        $('#next').on('click', async () => { if (app.page < app.pages) { app.page++; await renderPage(app.page); } });

        $('#text').on('click', async () => {
            const t = await prompt('Text to place on the page:', { label: '// add text', placeholder: 'text to place…' });
            if (t?.trim()) armText(t.trim());
        });

        $('#date').on('click', () => armText(new Date().toLocaleDateString('fr-CH')));

        $('#undo').on('click', () => {
            const a = pageAnnots();
            const kind = a.order.pop();
            if (kind === 'stroke') a.strokes.pop();
            else if (kind === 'text') a.texts.pop();
            redrawOverlay();
        });

        $('#clear').on('click', () => {
            app.annots[app.page] = { strokes: [], texts: [], order: [] };
            redrawOverlay();
        });

        $('#save').on('click', async () => {
            const bytes = await buildSignedPdf(app.srcBytes, app.annots, SCALE);
            download(bytes, 'signed.pdf', 'application/pdf');
            toast('signed.pdf downloaded', 'success', 1800);
        });
    });
</script>
</body>
</html>
