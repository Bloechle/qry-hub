<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ paint.pad</title>
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- qry stack (Shoelace: toast rendering only) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry-ui.css">
    <link rel="stylesheet" href="../../../qry-hub-theme.css">
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

    <style>
        /* ─── App: paintpad (shared theme: ../../../qry-hub-theme.css) ───
           The tool toolbar keeps its own pill design: .active toggling is
           the app's UI, re-styled on qry tokens rather than replaced. ── */
        body.hub-app { accent-color: var(--qry-blue); }

        #panel { width: min(980px, 100%); padding: 20px; }

        #toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        #toolbar .sep { width: 1px; height: 26px; background: var(--qry-line-strong); margin: 0 4px; }
        #toolbar .spacer { flex: 1; }

        button, .btn {
            padding: 8px 14px;
            font: 600 .88em var(--qry-font-mono);
            color: var(--qry-blue);
            background: var(--qry-blue-50);
            border: none;
            border-radius: var(--qry-radius-sm);
            cursor: pointer;
        }
        button:hover, .btn:hover { filter: brightness(0.96); }
        button.active { color: #fff; background: var(--qry-blue); }
        button.primary { color: #fff; background: var(--qry-blue); }
        button:disabled { opacity: .4; cursor: default; }

        select {
            padding: 8px 10px;
            font: 600 .88em var(--qry-font-mono);
            color: var(--qry-blue);
            background: var(--qry-blue-50);
            border: none;
            border-radius: var(--qry-radius-sm);
            cursor: pointer;
            outline: none;
        }

        input[type=color] {
            width: 38px;
            height: 34px;
            padding: 2px;
            border: 1px solid var(--qry-line-strong);
            border-radius: var(--qry-radius-sm);
            background: var(--qry-surface);
            cursor: pointer;
        }

        #sizeWrap { display: flex; align-items: center; gap: 6px; font: .8em var(--qry-font-mono); color: var(--qry-text-muted); }
        #size { width: 90px; }

        #stage {
            border: 1px solid var(--qry-line-strong);
            border-radius: var(--qry-radius);
            overflow: hidden;
        }

        #hint {
            margin-top: 14px;
            text-align: center;
            font: .85em var(--qry-font-mono);
            color: var(--qry-text-muted);
        }
    </style>
</head>
<body class="hub-app">
<header>
    <h1><span class="prompt">$</span> paint.pad<span class="caret"></span></h1>
    <p>Quick sketches — brush, shapes and images on a Fabric.js canvas.</p>
</header>

<div id="panel" class="qry-card qry-card-body">
    <div id="toolbar">
        <button id="t-brush" class="tool active">brush</button>
        <button id="t-eraser" class="tool">eraser</button>
        <button id="t-select" class="tool">select</button>
        <button id="t-shape" class="tool">shape</button>
        <select id="shape">
            <option value="rectangle">rectangle</option>
            <option value="circle">circle</option>
            <option value="line">line</option>
            <option value="triangle">triangle</option>
            <option value="arrow">arrow</option>
        </select>
        <span class="sep"></span>
        <input type="color" id="color" value="#0B6BCB" title="color">
        <span id="sizeWrap"><input type="range" id="size" min="1" max="50" value="4"><span id="sizeVal">4</span></span>
        <span class="spacer"></span>
        <button id="undo" title="Ctrl+Z">undo</button>
        <button id="redo" title="Ctrl+Y">redo</button>
        <span class="sep"></span>
        <label class="btn">image<input id="file" type="file" accept="image/*" hidden></label>
        <button id="clear">clear</button>
        <button id="save" class="primary">save PNG</button>
    </div>

    <div id="stage"><canvas id="canvas"></canvas></div>

    <div id="hint">brush to paint · shape: drag to create · select: move, resize, <kbd>Del</kbd> removes ·
        <kbd>Ctrl+Z</kbd>/<kbd>Y</kbd> undo/redo</div>
</div>

<script type="module">
    import { toast, download } from 'https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry-kit.js';

    // ═══ Pure geometry (testable) ════════════════════════════════════════
    function trianglePoints(a, b) {
        return [{ x: (a.x + b.x) / 2, y: a.y }, { x: a.x, y: b.y }, { x: b.x, y: b.y }];
    }

    function arrowPoints(a, b) {
        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        const head = Math.min(Math.hypot(b.x - a.x, b.y - a.y) * 0.3, 30);
        return [
            a,
            { x: b.x - head * Math.cos(angle - Math.PI / 6), y: b.y - head * Math.sin(angle - Math.PI / 6) },
            { x: b.x - head * 0.7 * Math.cos(angle), y: b.y - head * 0.7 * Math.sin(angle) },
            { x: b.x - head * Math.cos(angle + Math.PI / 6), y: b.y - head * Math.sin(angle + Math.PI / 6) },
            b
        ];
    }

    // ═══ Canvas ══════════════════════════════════════════════════════════
    const fc = new fabric.Canvas('canvas', {
        backgroundColor: '#FFFFFF',
        preserveObjectStacking: true,
        isDrawingMode: true
    });

    const state = { tool: 'brush', drawingShape: false, start: null, ghost: null };

    const color = () => $('#color').val();
    const size = () => parseInt($('#size').val());

    function fitCanvas() {
        const w = Math.min(940, $('#stage').width());
        fc.setDimensions({ width: w, height: Math.round(w * 0.62) });
    }

    // ═══ Tools ═══════════════════════════════════════════════════════════
    function setBrush(brushColor) {
        fc.freeDrawingBrush = new fabric.PencilBrush(fc);
        fc.freeDrawingBrush.width = size();
        fc.freeDrawingBrush.color = brushColor;
    }

    function setTool(tool) {
        state.tool = tool;
        $.all('.tool').forEach(b => b.cls(b.id === 't-' + tool ? 'active' : '-active'));
        fc.discardActiveObject();
        fc.isDrawingMode = tool === 'brush' || tool === 'eraser';
        fc.selection = tool === 'select';
        fc.forEachObject(o => o.selectable = tool === 'select');
        if (tool === 'brush') setBrush(color());
        if (tool === 'eraser') setBrush('#FFFFFF');             // paints background white
        fc.defaultCursor = tool === 'shape' ? 'crosshair' : 'default';
        fc.requestRenderAll();
    }

    function makeShape(type, a, b) {
        const common = { fill: 'transparent', stroke: color(), strokeWidth: size(), selectable: false };
        switch (type) {
            case 'rectangle': return new fabric.Rect({
                ...common,
                left: Math.min(a.x, b.x), top: Math.min(a.y, b.y),
                width: Math.abs(b.x - a.x), height: Math.abs(b.y - a.y)
            });
            case 'circle': {
                const r = Math.hypot(b.x - a.x, b.y - a.y) / 2;
                return new fabric.Circle({ ...common, left: (a.x + b.x) / 2 - r, top: (a.y + b.y) / 2 - r, radius: r });
            }
            case 'line': return new fabric.Line([a.x, a.y, b.x, b.y], common);
            case 'triangle': return new fabric.Polygon(trianglePoints(a, b), common);
            case 'arrow': return new fabric.Polyline(arrowPoints(a, b), common);
        }
    }

    // Drag-to-create with live ghost
    fc.on('mouse:down', e => {
        if (state.tool !== 'shape') return;
        state.drawingShape = true;
        state.start = fc.getPointer(e.e);
    });

    fc.on('mouse:move', e => {
        if (!state.drawingShape) return;
        if (state.ghost) fc.remove(state.ghost);
        state.ghost = makeShape($('#shape').val(), state.start, fc.getPointer(e.e));
        fc.add(state.ghost);
        fc.requestRenderAll();
    });

    fc.on('mouse:up', () => {
        if (!state.drawingShape) return;
        state.drawingShape = false;
        state.ghost = null;                                     // last ghost stays as the shape
        snapshot();
    });

    // ═══ Undo / redo (JSON snapshots) ════════════════════════════════════
    const undoStack = [];
    const redoStack = [];
    let restoring = false;

    const serialize = () => JSON.stringify(fc.toJSON());

    function snapshot() {
        if (restoring) return;
        undoStack.push(serialize());
        if (undoStack.length > 50) undoStack.shift();
        redoStack.length = 0;
        refreshHistoryButtons();
    }

    function restore(json) {
        restoring = true;
        fc.loadFromJSON(json, () => {
            fc.forEachObject(o => o.selectable = state.tool === 'select');
            fc.renderAll();
            restoring = false;
        });
    }

    function undo() {
        if (undoStack.length < 2) return;
        redoStack.push(undoStack.pop());
        restore(undoStack[undoStack.length - 1]);
        refreshHistoryButtons();
    }

    function redo() {
        if (!redoStack.length) return;
        const json = redoStack.pop();
        undoStack.push(json);
        restore(json);
        refreshHistoryButtons();
    }

    function refreshHistoryButtons() {
        $('#undo').enable(undoStack.length > 1);
        $('#redo').enable(redoStack.length > 0);
    }

    // Brush strokes & select edits land here; shape drags call snapshot() directly
    fc.on('path:created', snapshot);
    fc.on('object:modified', snapshot);
    fc.on('object:removed', () => { if (!state.drawingShape && !restoring) snapshot(); });

    // ═══ Boot ════════════════════════════════════════════════════════════
    $.ready(() => {
        fitCanvas();
        window.on('resize', fitCanvas);
        snapshot();                                             // baseline empty state
        setTool('brush');

        $.all('.tool').forEach(b => b.on('click', () => setTool(b.id.slice(2))));
        $('#shape').on('change', () => setTool('shape'));

        $('#color').on('input', () => { if (state.tool === 'brush') setBrush(color()); });
        $('#size').on('input', () => {
            $('#sizeVal').text(size());
            if (fc.isDrawingMode) fc.freeDrawingBrush.width = size();
        });

        $('#undo').on('click', undo);
        $('#redo').on('click', redo);

        $('#clear').on('click', () => {
            fc.clear();
            fc.setBackgroundColor('#FFFFFF', () => fc.renderAll());
            snapshot();
        });

        $('#file').on('change', e => {
            const f = e.target.files[0];
            if (!f) return;
            const url = URL.createObjectURL(f);
            fabric.Image.fromURL(url, img => {
                const s = Math.min(1, fc.width / 2 / img.width, fc.height / 2 / img.height);
                img.scale(s).set({ left: 20, top: 20, selectable: state.tool === 'select' });
                fc.add(img);
                fc.requestRenderAll();
                snapshot();
                URL.revokeObjectURL(url);
            });
            e.target.value = '';
        });

        $('#save').on('click', async () => {
            const blob = await (await fetch(fc.toDataURL({ format: 'png', multiplier: 2 }))).blob();
            download(blob, 'paintpad.png', 'image/png');
            toast('paintpad.png downloaded', 'success', 1800);
        });

        window.on('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
            else if ((e.ctrlKey || e.metaKey) && e.code === 'KeyY') { e.preventDefault(); redo(); }
            else if ((e.key === 'Delete' || e.key === 'Backspace') && state.tool === 'select') {
                const sel = fc.getActiveObjects();
                if (sel.length && document.activeElement?.tagName !== 'INPUT') {
                    fc.discardActiveObject();
                    sel.forEach(o => fc.remove(o));
                    fc.requestRenderAll();
                }
            }
        });
    });
</script>
</body>
</html>
