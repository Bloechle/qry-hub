<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ adapt.live</title>
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- qry stack -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Bloechle/qry@1.0.0/qry-ui.css">
    <link rel="stylesheet" href="../../../qry-hub-theme.css">
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry@1.0.0/qry.js"></script>

    <style>
        /* ─── App: adaptlive (shared theme: ../../../qry-hub-theme.css) ── */
        :root {
            --psi: #0B6BCB;
            --quest: #1E8E5A;
            --zoom: #E2622B;
            --stair: #7C3AED;
            --truth: #B45309;
        }

        body.hub-app { justify-content: center; }

        #panel { width: min(1020px, 100%); padding: 20px; }

        /* Controls */
        #controls {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px;
            margin-bottom: 14px;
        }
        .field { display: flex; flex-direction: column; gap: 3px; }
        .field label {
            font: 600 .65em var(--qry-font-mono);
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--qry-text-muted);
        }
        .field label output { color: var(--qry-text); }
        input[type="range"] { width: 120px; accent-color: var(--qry-blue); }
        #controls sl-select { min-width: 110px; }
        #buttons { display: flex; gap: 8px; margin-left: auto; }

        /* Method chips (toggle + legend) */
        #chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font: 600 .8em var(--qry-font-mono);
            color: var(--qry-text);
            background: var(--qry-surface);
            border: 1px solid var(--qry-line-strong);
            border-radius: 999px;
            padding: 5px 12px;
            cursor: pointer;
            user-select: none;
            transition: border-color .18s var(--qry-ease), opacity .18s var(--qry-ease);
        }
        .chip .swatch { width: 11px; height: 11px; border-radius: 50%; background: var(--c); }
        .chip:hover { border-color: var(--c); }
        .chip.on { border-color: var(--c); box-shadow: inset 0 0 0 1px var(--c); }
        .chip:not(.on) { opacity: .45; }
        .chip:not(.on) .swatch { background: var(--qry-text-muted); }

        /* Chart */
        #chart {
            display: block;
            width: 100%;
            aspect-ratio: 900 / 380;
            background: var(--qry-bg);
            border: 1px solid var(--qry-line-strong);
            border-radius: var(--qry-radius);
            user-select: none;
        }
        .grid-line { stroke: var(--qry-blue-50); stroke-width: 1; }
        .axis-line { stroke: #93A7BC; stroke-width: 1.5; }
        .tick-label { font: 11px var(--qry-font-mono); fill: var(--qry-text-muted); }
        .axis-title { font: 600 12px var(--qry-font-mono); fill: var(--qry-text-muted); }
        .truth-band { fill: var(--truth); opacity: .08; }
        .truth-line { stroke: var(--truth); stroke-width: 2; stroke-dasharray: 6 5; }
        .truth-label { font: 600 12px var(--qry-font-mono); fill: var(--truth); }
        .est-line { fill: none; stroke-width: 2.5; }
        .trial-dot { stroke-width: 1.5; }

        .note { margin: 20px 0 16px; text-align: center; font: .9em var(--qry-font-mono); color: var(--qry-text-muted); }

        /* Metrics (generated markup: .metric > .label / .value / .delta) */
        #metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
            gap: 8px;
        }
        .metric {
            background: var(--qry-bg);
            border: 1px solid var(--qry-line-strong);
            border-radius: var(--qry-radius-sm);
            padding: 7px 10px;
            text-align: center;
        }
        .metric .label {
            display: block;
            font: 600 .65em var(--qry-font-mono);
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--qry-text-muted);
        }
        .metric .value {
            font: 600 .95em var(--qry-font-mono);
            font-variant-numeric: tabular-nums;
            color: var(--qry-text);
            white-space: nowrap;
        }
        .metric .value.est { color: var(--c); }
        .metric .delta { display: block; font: .7em var(--qry-font-mono); color: var(--qry-text-muted); }
    </style>
</head>
<body class="hub-app">
<header>
    <h1><span class="prompt">$</span> adapt.live<span class="caret"></span></h1>
    <p>Four adaptive threshold methods racing on a simulated observer.</p>
</header>

<div id="panel" class="qry-card qry-card-body">
    <div id="controls">
        <div class="field">
            <label>Threshold <output id="o-thr">0.35</output></label>
            <input id="c-thr" type="range" min="0.05" max="0.95" step="0.01" value="0.35">
        </div>
        <div class="field">
            <label>Slope <output id="o-slope">25</output></label>
            <input id="c-slope" type="range" min="3" max="50" step="1" value="25">
        </div>
        <div class="field">
            <label>Lapse <output id="o-lapse">0.02</output></label>
            <input id="c-lapse" type="range" min="0" max="0.10" step="0.01" value="0.02">
        </div>
        <sl-select id="c-trials" label="Trials" size="small" value="50">
            <sl-option value="25">25</sl-option>
            <sl-option value="50">50</sl-option>
            <sl-option value="75">75</sl-option>
            <sl-option value="100">100</sl-option>
        </sl-select>
        <sl-select id="c-speed" label="Speed" size="small" value="40">
            <sl-option value="120">slow</sl-option>
            <sl-option value="40">fast</sl-option>
            <sl-option value="0">instant</sl-option>
        </sl-select>
        <div id="buttons">
            <sl-button id="b-run" size="small" variant="primary">Run</sl-button>
            <sl-button id="b-step" size="small">Step</sl-button>
            <sl-button id="b-reset" size="small">Reset</sl-button>
        </div>
    </div>

    <div id="chips"></div>

    <svg id="chart" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
        <g id="g-grid"></g>
        <g id="g-truth"></g>
        <g id="g-axes"></g>
        <g id="g-dots"></g>
        <g id="g-lines"></g>
    </svg>

    <div class="note">dots = tested stimuli (filled ✓ / hollow ✗) · lines = running threshold estimates · band = ±1σ around the true threshold</div>

    <div id="metrics"></div>
</div>

<script>
    /* ─── Adaptive procedures (ported from the VR lab codebase) ───── */

    class AdaptiveStaircase {
        constructor(o = {}) {
            this.startValue = o.startValue ?? 0.5;
            this.stepSize = o.initialStepSize ?? 0.2;
            this.minStepSize = o.minStepSize ?? 0.02;
            this.stepSizeReduction = o.stepSizeReduction ?? 0.5;
            this.successesNeeded = o.successesNeeded ?? 2;
            this.failuresNeeded = o.failuresNeeded ?? 1;
            this.requiredReversals = o.requiredReversals ?? 6;
            this.maxDeviation = o.maxDeviation ?? 0.3;
            this.currentValue = this.startValue;
            this.trials = [];
            this.streak = 0;
            this.lastResponse = null;
        }

        getNextValue() { return this.currentValue; }

        recordResponse(value, success) {
            const isReversal = this.lastResponse !== null && success !== this.lastResponse;
            if (isReversal) {
                this.streak = 1;
                if (this.stepSize > this.minStepSize) this.stepSize *= this.stepSizeReduction;
            } else {
                this.streak++;
            }
            this.trials.push({ value, success, isReversal });
            this.lastResponse = success;

            const shouldAdjust = success ? this.streak >= this.successesNeeded : this.streak >= this.failuresNeeded;
            if (shouldAdjust) {
                this.streak = 0;
                const next = Math.max(0, Math.min(1, this.currentValue + (success ? -this.stepSize : this.stepSize)));
                if (Math.abs(next - this.startValue) > this.maxDeviation) this.stepSize *= 0.5;
                this.currentValue = next;
            }
        }

        getEstimatedThreshold() {
            const reversals = this.trials.filter(t => t.isReversal).slice(-this.requiredReversals);
            if (!reversals.length) return this.currentValue;
            return reversals.reduce((s, t) => s + t.value, 0) / reversals.length;
        }
    }

    class BayesianQuest {
        constructor(o = {}) {
            this.n = o.numSamples ?? 100;
            this.step = o.stepSize ?? 0.01;
            this.beta = o.beta ?? 3.5;
            this.lambda = o.lambda ?? 0.02;
            this.thresholds = Array.from({ length: this.n }, (_, i) => i * this.step);
            this.prior = Array.from({ length: this.n }, () => 1 / this.n + Math.random() * 0.01);
            this._normalize();
        }

        _normalize() {
            const s = this.prior.reduce((a, b) => a + b, 0);
            this.prior = this.prior.map(p => p / s);
        }

        _pSuccess(value, threshold) {
            const p = 1 / (1 + Math.exp(-this.beta * (value - threshold)));
            return (1 - this.lambda) * p + this.lambda * 0.5;
        }

        getNextValue() {
            let best = 0, max = -Infinity;
            for (let i = 0; i < this.n; i++) {
                let h = 0;
                for (let j = 0; j < this.n; j++) {
                    if (this.prior[j] <= 0) continue;
                    const p = this._pSuccess(this.thresholds[i], this.thresholds[j]);
                    h -= this.prior[j] * (p * Math.log2(Math.max(p, 1e-10)) + (1 - p) * Math.log2(Math.max(1 - p, 1e-10)));
                }
                if (h > max) { max = h; best = this.thresholds[i]; }
            }
            const jitter = Math.random() * this.step * 2 - this.step;
            return Math.max(0, Math.min(1, best + jitter));
        }

        recordResponse(value, success) {
            const eps = 1e-6;
            let sum = 0;
            for (let i = 0; i < this.n; i++) {
                const p = this._pSuccess(value, this.thresholds[i]);
                this.prior[i] *= success ? p : 1 - p;
                sum += this.prior[i];
            }
            sum = Math.max(sum, eps * this.n);
            for (let i = 0; i < this.n; i++) this.prior[i] = (this.prior[i] + eps) / (sum + eps * this.n);
        }

        getEstimatedThreshold() {
            let best = 0;
            for (let i = 1; i < this.n; i++) if (this.prior[i] > this.prior[best]) best = i;
            return this.thresholds[best];
        }
    }

    class BayesianPsi {
        constructor(o = {}) {
            this.n = o.numSamples ?? 100;
            this.m = o.numSlopes ?? 10;
            this.step = o.stepSize ?? 0.01;
            this.lambda = o.lambda ?? 0.02;
            this.thresholds = Array.from({ length: this.n }, (_, i) => i * this.step);
            this.slopes = Array.from({ length: this.m }, (_, j) => 1 + j * 0.5);
            const size = this.n * this.m;
            this.prior = Array.from({ length: size }, () => 1 / size + Math.random() * 0.01);
            const s = this.prior.reduce((a, b) => a + b, 0);
            this.prior = this.prior.map(p => p / s);
        }

        _pSuccess(value, threshold, slope) {
            const p = 1 / (1 + Math.exp(-slope * (value - threshold)));
            return (1 - this.lambda) * p + this.lambda * 0.5;
        }

        getNextValue() {
            let best = 0, max = -Infinity;
            for (let i = 0; i < this.n; i++) {
                const value = this.thresholds[i];
                let h = 0;
                for (let a = 0; a < this.n; a++) {
                    for (let b = 0; b < this.m; b++) {
                        const w = this.prior[a * this.m + b];
                        if (w <= 0) continue;
                        const p = this._pSuccess(value, this.thresholds[a], this.slopes[b]);
                        h -= w * (p * Math.log2(Math.max(p, 1e-10)) + (1 - p) * Math.log2(Math.max(1 - p, 1e-10)));
                    }
                }
                if (h > max) { max = h; best = value; }
            }
            const jitter = Math.random() * this.step * 2 - this.step;
            return Math.max(0, Math.min(1, best + jitter));
        }

        recordResponse(value, success) {
            const eps = 1e-6;
            let sum = 0;
            for (let a = 0; a < this.n; a++) {
                for (let b = 0; b < this.m; b++) {
                    const i = a * this.m + b;
                    const p = this._pSuccess(value, this.thresholds[a], this.slopes[b]);
                    this.prior[i] *= success ? p : 1 - p;
                    sum += this.prior[i];
                }
            }
            sum = Math.max(sum, eps * this.prior.length);
            for (let i = 0; i < this.prior.length; i++) this.prior[i] = (this.prior[i] + eps) / (sum + eps * this.prior.length);
        }

        getEstimatedThreshold() {
            let best = 0;
            for (let i = 1; i < this.prior.length; i++) if (this.prior[i] > this.prior[best]) best = i;
            return this.thresholds[Math.floor(best / this.m)];
        }
    }

    /* ZOOM — tree of OOM grids (Audiffren, 2023) */
    class OOM {
        static SAMPLE = 0;
        static ZOOM = 1;

        constructor(muStar, min, max, T, K, coefCi = 1.5) {
            this.muStar = muStar;
            this.min = min;
            this.max = max;
            this.T = T;
            this.K = K;
            this.coefCi = coefCi;
            // per arm: [positive, total, relation CI, relation KL]
            this.arms = Array.from({ length: K + 1 }, (_, i) =>
                i === 0 ? [0, 0, -2, -2] : i === K ? [0, 0, 2, 2] : [0, 0, 0, 0]);
            this.lastIndex = Math.floor(K / 2);
            this.children = {};
        }

        value(k) { return k * (this.max - this.min) / this.K + this.min; }

        _kl(hmu, mu) {
            if (mu === hmu) return 0;
            const log = (h, m) => h * Math.log(h / m) + (1 - h) * Math.log((1 - h) / (1 - m));
            if (mu > hmu) return hmu > 0 ? log(hmu, mu) : -Math.log(1 - mu);
            return hmu < 1 ? log(hmu, mu) : -Math.log(mu);
        }

        _relations(k) {
            const [pos, total] = this.arms[k];
            const est = pos / total;
            const b = Math.sqrt(this.coefCi * Math.log(this.T) / total);
            const klError = Math.log(this.T / total) / total;
            const ci = est + b < this.muStar ? -2 : est - b > this.muStar ? 2 : est > this.muStar ? 1 : -1;
            const d = this._kl(est, this.muStar);
            const kl = est > this.muStar ? (d >= klError ? 2 : 1) : (d >= klError ? -2 : -1);
            return [ci, kl];
        }

        whatToDo(optimistic, peek = false) {
            let action = OOM.SAMPLE, index = this.lastIndex;
            const [p0, t0] = this.arms[this.lastIndex];
            if (t0 > 0) {
                const hi = this.lastIndex + (p0 / t0 > this.muStar ? 0 : 1);
                const lo = hi - 1;
                const r0 = this.arms[lo][optimistic ? 3 : 2];
                const r1 = this.arms[hi][optimistic ? 3 : 2];
                const t1 = this.arms[hi][1];
                if (r0 === -2) {
                    action = r1 === 2 ? OOM.ZOOM : OOM.SAMPLE;
                    index = r1 === 2 ? lo : hi;
                } else {
                    index = r1 === 2 ? lo : (t1 === 0 ? hi : (t0 < t1 ? lo : hi));
                }
            }
            if (action === OOM.SAMPLE && !peek) this.lastIndex = index;
            return [action, index];
        }

        zoom(i) {
            const size = (this.max - this.min) / this.K;
            const min = this.min + i * size;
            return new OOM(this.muStar, min, min + size, this.T, this.K, this.coefCi);
        }

        updateArm(answer) {
            const a = this.arms[this.lastIndex];
            a[0] += answer ? 1 : 0;
            a[1]++;
            [a[2], a[3]] = this._relations(this.lastIndex);
        }

        mostPulledArm() {
            let max = 0, idx = this.lastIndex;
            this.arms.forEach((a, i) => { if (a[1] > max) { max = a[1]; idx = i; } });
            return this.value(idx);
        }
    }

    class ZOOM {
        constructor(o = {}) {
            this.muStar = o.muStar ?? 0.5;
            this.T = o.T ?? 50;
            let K = o.K ?? 0;
            if (K === 0) K = Math.floor(Math.sqrt(this.T / (Math.log(this.T) * Math.log(Math.log(this.T)))));
            if (K % 2 === 1) K--;
            this.K = Math.max(K, 4);
            this.root = new OOM(this.muStar, 0, 1, this.T, this.K);
            this.oom = this.root;
            this.optimistic = false;
        }

        getNextValue() {
            this.oom = this.root;
            while (true) {
                const [action, index] = this.oom.whatToDo(this.optimistic);
                if (action === OOM.SAMPLE) return this.oom.value(index);
                if (!this.oom.children[index]) this.oom.children[index] = this.oom.zoom(index);
                this.oom = this.oom.children[index];
            }
        }

        recordResponse(value, success) {
            this.oom.updateArm(success);
            this.optimistic = !this.optimistic;
        }

        getEstimatedThreshold() {
            // peek=true: reading the estimate must not disturb sampling state
            let oom = this.root;
            while (true) {
                const [action, index] = oom.whatToDo(true, true);
                if (action === OOM.SAMPLE || !oom.children[index]) break;
                oom = oom.children[index];
            }
            return oom.mostPulledArm();
        }
    }

    /* ─── Simulation ───────────────────────────────────────────────── */

    const METHODS = [
        { key: 'psi',   label: 'BayesianPsi',       make: () => new BayesianPsi() },
        { key: 'quest', label: 'BayesianQuest',     make: () => new BayesianQuest() },
        { key: 'zoom',  label: 'ZOOM',              make: o => new ZOOM({ T: o.maxTrials }) },
        { key: 'stair', label: 'AdaptiveStaircase', make: () => new AdaptiveStaircase() }
    ];

    const config = { trueThreshold: 0.35, trueSlope: 25, lapseRate: 0.02, maxTrials: 50 };
    const state = { runners: [], trial: 0, timer: null };
    const active = new Set(METHODS.map(m => m.key));

    // Simulated observer: logistic psychometric function with lapse rate
    const respond = stimulus => {
        const p = 1 / (1 + Math.exp(-config.trueSlope * (stimulus - config.trueThreshold)));
        return Math.random() < (1 - config.lapseRate) * p + config.lapseRate * 0.5;
    };

    const reset = () => {
        stop();
        state.trial = 0;
        state.runners = METHODS.map(m => ({
            ...m,
            proc: m.make(config),
            trials: [],     // {value, success}
            estimates: []   // running threshold estimate
        }));
        render();
    };

    const stepOnce = () => {
        if (state.trial >= config.maxTrials) { stop(); return false; }
        state.runners.forEach(r => {
            const value = r.proc.getNextValue();
            const success = respond(value);
            r.proc.recordResponse(value, success);
            r.trials.push({ value, success });
            r.estimates.push(r.proc.getEstimatedThreshold());
        });
        state.trial++;
        render();
        return state.trial < config.maxTrials;
    };

    const run = () => {
        stop();
        if (state.trial >= config.maxTrials) reset();
        const delay = +$('#c-speed').val();
        if (delay === 0) {
            while (stepOnce()) ;
        } else {
            $('#b-run').text('Pause');
            state.timer = setInterval(() => { if (!stepOnce()) stop(); }, delay);
        }
    };

    const stop = () => {
        if (state.timer) clearInterval(state.timer);
        state.timer = null;
        $('#b-run').text(state.trial > 0 && state.trial < config.maxTrials ? 'Resume' : 'Run');
    };

    /* ─── Rendering ────────────────────────────────────────────────── */

    const M = { top: 18, right: 70, bottom: 42, left: 52 };
    const W = 900, H = 380;
    const IW = W - M.left - M.right, IH = H - M.top - M.bottom;
    const sx = t => M.left + (t - 1) / Math.max(config.maxTrials - 1, 1) * IW;
    const sy = v => M.top + (1 - v) * IH;
    const fmt = v => v.toFixed(3);

    const renderStatic = () => {
        let grid = '', axes = '';
        for (let v = 0; v <= 1.001; v += 0.25) {
            grid += `<line class="grid-line" x1="${M.left}" y1="${sy(v)}" x2="${M.left + IW}" y2="${sy(v)}"/>`;
            axes += `<text class="tick-label" x="${M.left - 8}" y="${sy(v) + 4}" text-anchor="end">${v.toFixed(2)}</text>`;
        }
        const ticks = config.maxTrials <= 25 ? 5 : 10;
        for (let t = ticks; t <= config.maxTrials; t += ticks) {
            axes += `<text class="tick-label" x="${sx(t)}" y="${M.top + IH + 18}" text-anchor="middle">${t}</text>`;
        }
        axes += `<line class="axis-line" x1="${M.left}" y1="${M.top + IH}" x2="${M.left + IW}" y2="${M.top + IH}"/>`;
        axes += `<line class="axis-line" x1="${M.left}" y1="${M.top}" x2="${M.left}" y2="${M.top + IH}"/>`;
        axes += `<text class="axis-title" x="${M.left + IW / 2}" y="${H - 6}" text-anchor="middle">trial</text>`;
        axes += `<text class="axis-title" transform="translate(14,${M.top + IH / 2}) rotate(-90)" text-anchor="middle">stimulus</text>`;
        $('#g-grid').html(grid);
        $('#g-axes').html(axes);

        // True threshold line + ±1σ band (logistic: σ ≈ π / (√3·β))
        const sigma = Math.PI / (Math.sqrt(3) * config.trueSlope);
        const lo = Math.max(0, config.trueThreshold - sigma);
        const hi = Math.min(1, config.trueThreshold + sigma);
        $('#g-truth').html(
            `<rect class="truth-band" x="${M.left}" y="${sy(hi)}" width="${IW}" height="${sy(lo) - sy(hi)}"/>` +
            `<line class="truth-line" x1="${M.left}" y1="${sy(config.trueThreshold)}" x2="${M.left + IW}" y2="${sy(config.trueThreshold)}"/>` +
            `<text class="truth-label" x="${M.left + IW + 6}" y="${sy(config.trueThreshold) + 4}">${config.trueThreshold.toFixed(2)}</text>`);
    };

    const renderData = () => {
        let dots = '', lines = '';
        state.runners.forEach(r => {
            if (!active.has(r.key) || !r.trials.length) return;
            const color = `var(--${r.key})`;
            r.trials.forEach((t, i) => {
                dots += `<circle class="trial-dot" cx="${sx(i + 1)}" cy="${sy(t.value)}" r="4" ` +
                    `fill="${t.success ? color : 'white'}" stroke="${color}" opacity="0.8">` +
                    `<title>${r.label} — trial ${i + 1}\nstimulus ${fmt(t.value)} · ${t.success ? 'success' : 'failure'}</title></circle>`;
            });
            const path = r.estimates.map((e, i) => `${i ? 'L' : 'M'}${sx(i + 1)},${sy(e)}`).join('');
            lines += `<path class="est-line" d="${path}" stroke="${color}"/>`;
        });
        $('#g-dots').html(dots);
        $('#g-lines').html(lines);
    };

    const renderMetrics = () => {
        const metrics = $('#metrics');
        metrics.empty();
        const trialMetric = $.create('div', { class: 'metric' });
        trialMetric.add($.create('span', { class: 'label', text: 'trial' }));
        trialMetric.add($.create('span', { class: 'value', text: `${state.trial} / ${config.maxTrials}` }));
        trialMetric.mount(metrics);

        state.runners.forEach(r => {
            if (!active.has(r.key)) return;
            const metric = $.create('div', { class: 'metric' });
            metric.style.setProperty('--c', `var(--${r.key})`);
            metric.add($.create('span', { class: 'label', text: r.label }));
            const est = r.estimates.length ? r.estimates[r.estimates.length - 1] : null;
            metric.add($.create('span', { class: 'value est', text: est === null ? '—' : fmt(est) }));
            const delta = est === null ? '' : `Δ ${(est - config.trueThreshold >= 0 ? '+' : '')}${fmt(est - config.trueThreshold)}`;
            metric.add($.create('span', { class: 'delta', text: delta }));
            metric.mount(metrics);
        });
    };

    const render = () => {
        renderStatic();
        renderData();
        renderMetrics();
    };

    /* ─── UI wiring ────────────────────────────────────────────────── */

    $.ready(() => {
        const chips = $('#chips');
        METHODS.forEach(m => {
            const chip = $.create('div', { class: 'chip on' });
            chip.style.setProperty('--c', `var(--${m.key})`);
            chip.add($.create('span', { class: 'swatch' }));
            chip.add($.create('span', { text: m.label }));
            chip.on('click', () => {
                if (active.has(m.key)) { active.delete(m.key); chip.cls('-on'); }
                else { active.add(m.key); chip.cls('on'); }
                render();
            });
            chip.mount(chips);
        });

        const bind = (id, out, key, parse = parseFloat, fmtOut = v => v) => {
            $(id).on('input', () => {
                const v = parse($(id).val());
                config[key] = v;
                if (out) $(out).text(fmtOut(v));
                reset();
            });
        };
        bind('#c-thr', '#o-thr', 'trueThreshold', parseFloat, v => v.toFixed(2));
        bind('#c-slope', '#o-slope', 'trueSlope', parseFloat);
        bind('#c-lapse', '#o-lapse', 'lapseRate', parseFloat, v => v.toFixed(2));
        $('#c-trials').on('sl-change', () => { config.maxTrials = +$('#c-trials').val(); reset(); });

        $('#b-run').on('click', () => state.timer ? stop() : run());
        $('#b-step').on('click', () => { stop(); stepOnce(); });
        $('#b-reset').on('click', reset);

        reset();
    });
</script>
</body>
</html>
