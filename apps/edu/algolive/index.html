<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ algo.live</title>
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry@1.0.0/qry.js"></script>
    <style>
        /* ═══ THEME — inline copy of /theme.css ═══════════════════════════
           Do not edit here: edit theme.css, then re-paste this block. ═══ */

        :root {
            --bg: #F4F7FB;
            --card: #FFFFFF;
            --ink: #0F1722;
            --muted: #5B6B7D;
            --accent: #0B6BCB;
            --accent-soft: #E3EEFA;
            --accent-glow: rgba(11, 107, 203, .25);
            --border: #DCE4ED;
            --ok: #15803D;
            --warn: #B45309;
            --err: #C2410C;
            --radius: 12px;
            --ring: 0 0 0 3px var(--accent-soft);
            --shadow-card: 0 8px 20px rgba(15, 23, 34, .05);
            --shadow-hover: 0 10px 24px rgba(11, 107, 203, .14);
            --ease: cubic-bezier(.2, .8, .2, 1);
            --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
            --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; }

        ::selection { background: var(--accent); color: #fff; }

        body {
            margin: 0;
            background: var(--bg);
            background-image: radial-gradient(rgba(11, 107, 203, .10) 1px, transparent 1px);
            background-size: 26px 26px;
            color: var(--ink);
            font: 16px/1.5 var(--sans);
        }

        /* ── Header: command prompt ──────────────────────────────────── */
        header h1 {
            font: 700 2.4em/1.2 var(--mono);
            letter-spacing: -.02em;
            margin: 0 0 6px;
        }

        header h1 .prompt { color: var(--accent); }

        header h1 .caret {
            display: inline-block;
            width: .55em;
            height: 1.05em;
            margin-left: 4px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            vertical-align: text-bottom;
            animation: blink 1.1s steps(1) infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @media (prefers-reduced-motion: reduce) {
            header h1 .caret { animation: none; }
        }

        header p { margin: 0; color: var(--muted); }

        /* ── Panel (main card) ───────────────────────────────────────── */
        #panel {
            width: min(var(--panel-w, 980px), 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            padding: 20px;
        }

        /* ── Controls (select, buttons) ──────────────────────────────── */
        select, button {
            font: 600 .95em var(--mono);
            color: var(--ink);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
        }

        select:hover, select:focus-visible, button:hover, button:focus-visible {
            border-color: var(--accent);
            box-shadow: var(--ring);
            outline: none;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ── Note (caption under the content) ────────────────────────── */
        .note {
            margin: 36px 0 28px;
            text-align: center;
            font: .9em var(--mono);
            color: var(--muted);
        }

        /* ── Metrics (stable grid, no layout shift) ──────────────────── */
        #metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
            gap: 8px;
        }

        .metric {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 10px;
            text-align: center;
        }

        .metric .label {
            display: block;
            font: 600 .65em var(--mono);
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
        }

        .metric .value {
            font: 600 .95em var(--mono);
            font-variant-numeric: tabular-nums;
            color: var(--ink);
            white-space: nowrap;
        }

        /* ═══ END THEME ═══════════════════════════════════════════════ */

        /* ─── App: algolive ───────────────────────────────────────────── */
        :root {
            --bar: var(--accent);
            --bar-cmp: #E0A100;
            --bar-swap: #E2622B;
            --bar-lock: #1E8E5A;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        header { text-align: center; margin-bottom: 24px; }

        @media (prefers-reduced-motion: reduce) {
            .bar { transition: none !important; }
        }

        /* ── Chart ───────────────────────────────────────────────────── */
        #panel { --panel-w: 920px; }

        #chart {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: min(48vh, 420px);
            padding: 10px 12px 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .bar {
            flex: 1;
            background: var(--bar);
            border-radius: 3px 3px 0 0;
            transition: height .12s ease, background-color .12s ease;
        }

        .bar.cmp  { background: var(--bar-cmp); }
        .bar.swap { background: var(--bar-swap); }
        .bar.lock { background: var(--bar-lock); }

        /* ── Controls ────────────────────────────────────────────────── */
        #controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        #speed-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font: .85em var(--mono);
            color: var(--muted);
        }

        #speed { width: 180px; accent-color: var(--accent); }

        #desc .name { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>
<header>
    <h1><span class="prompt">$</span> algo.live<span class="caret"></span></h1>
    <p>Sorting algorithms, visualized step by step.</p>
</header>

<div id="panel">
    <div id="chart"></div>
    <div id="controls">
        <select id="algo"></select>
        <select id="count">
            <option>16</option>
            <option selected>32</option>
            <option>48</option>
            <option>64</option>
            <option>96</option>
            <option>128</option>
        </select>
        <span id="speed-box">slow <input id="speed" type="range" min="0" max="6" step="1" value="3"> fast</span>
        <button id="shuffle">Shuffle</button>
        <button id="sort" class="primary">Sort</button>
    </div>
    <div id="desc" class="note"><span class="name"></span><span class="text"></span></div>
    <div id="metrics">
        <div class="metric"><span class="label">best</span><span class="value" id="m-best">—</span></div>
        <div class="metric"><span class="label">average</span><span class="value" id="m-avg">—</span></div>
        <div class="metric"><span class="label">worst</span><span class="value" id="m-worst">—</span></div>
        <div class="metric"><span class="label">space</span><span class="value" id="m-space">—</span></div>
        <div class="metric"><span class="label">comparisons</span><span class="value" id="m-cmp">0</span></div>
        <div class="metric"><span class="label">moves</span><span class="value" id="m-moves">0</span></div>
    </div>
</div>

<script>
    // ═══ Algorithms ════════════════════════════════════════════════════
    // Each algorithm is a generator that sorts the array in place and
    // yields visual steps: {cmp:[i,j]} compare, {swap:[i,j]} swap,
    // {set:[i]} write (merge), {lock:i} index in final position.

    function swap(a, i, j) { [a[i], a[j]] = [a[j], a[i]]; }

    function* insertionSort(a) {
        for (let i = 1; i < a.length; i++) {
            let j = i;
            while (j > 0) {
                yield { cmp: [j - 1, j] };
                if (a[j - 1] <= a[j]) break;
                swap(a, j - 1, j);
                yield { swap: [j - 1, j] };
                j--;
            }
        }
    }

    function* selectionSort(a) {
        for (let i = 0; i < a.length - 1; i++) {
            let min = i;
            for (let j = i + 1; j < a.length; j++) {
                yield { cmp: [min, j] };
                if (a[j] < a[min]) min = j;
            }
            if (min !== i) {
                swap(a, i, min);
                yield { swap: [i, min] };
            }
            yield { lock: i };
        }
        yield { lock: a.length - 1 };
    }

    function* bubbleSort(a) {
        for (let i = a.length - 1; i > 0; i--) {
            let swapped = false;
            for (let j = 0; j < i; j++) {
                yield { cmp: [j, j + 1] };
                if (a[j] > a[j + 1]) {
                    swap(a, j, j + 1);
                    swapped = true;
                    yield { swap: [j, j + 1] };
                }
            }
            yield { lock: i };
            if (!swapped) break;
        }
        yield { lock: 0 };
    }

    function* shellSort(a) {
        for (let gap = Math.floor(a.length / 2); gap >= 1; gap = Math.floor(gap / 2)) {
            for (let i = gap; i < a.length; i++) {
                let j = i;
                while (j >= gap) {
                    yield { cmp: [j - gap, j] };
                    if (a[j - gap] <= a[j]) break;
                    swap(a, j - gap, j);
                    yield { swap: [j - gap, j] };
                    j -= gap;
                }
            }
        }
    }

    function* quickSort(a, lo = 0, hi = a.length - 1) {
        if (lo > hi) return;
        if (lo === hi) { yield { lock: lo }; return; }
        const pivot = a[hi];
        let i = lo;
        for (let j = lo; j < hi; j++) {
            yield { cmp: [j, hi] };
            if (a[j] < pivot) {
                if (i !== j) {
                    swap(a, i, j);
                    yield { swap: [i, j] };
                }
                i++;
            }
        }
        if (i !== hi) {
            swap(a, i, hi);
            yield { swap: [i, hi] };
        }
        yield { lock: i };
        yield* quickSort(a, lo, i - 1);
        yield* quickSort(a, i + 1, hi);
    }

    function* mergeSort(a, lo = 0, hi = a.length - 1) {
        if (lo >= hi) return;
        const mid = Math.floor((lo + hi) / 2);
        yield* mergeSort(a, lo, mid);
        yield* mergeSort(a, mid + 1, hi);

        const merged = [];
        let i = lo;
        let j = mid + 1;
        while (i <= mid && j <= hi) {
            yield { cmp: [i, j] };
            merged.push(a[i] <= a[j] ? a[i++] : a[j++]);
        }
        while (i <= mid) merged.push(a[i++]);
        while (j <= hi) merged.push(a[j++]);
        for (let k = 0; k < merged.length; k++) {
            a[lo + k] = merged[k];
            yield { set: [lo + k] };
        }
    }

    function* heapSort(a) {
        function* sift(i, n) {
            while (true) {
                let largest = i;
                const l = 2 * i + 1;
                const r = 2 * i + 2;
                if (l < n) {
                    yield { cmp: [l, largest] };
                    if (a[l] > a[largest]) largest = l;
                }
                if (r < n) {
                    yield { cmp: [r, largest] };
                    if (a[r] > a[largest]) largest = r;
                }
                if (largest === i) return;
                swap(a, i, largest);
                yield { swap: [i, largest] };
                i = largest;
            }
        }
        for (let i = Math.floor(a.length / 2) - 1; i >= 0; i--) yield* sift(i, a.length);
        for (let end = a.length - 1; end > 0; end--) {
            swap(a, 0, end);
            yield { swap: [0, end] };
            yield { lock: end };
            yield* sift(0, end);
        }
        yield { lock: 0 };
    }

    const ALGOS = {
        'insertion': insertionSort,
        'selection': selectionSort,
        'bubble':    bubbleSort,
        'shell':     shellSort,
        'quick':     quickSort,
        'merge':     mergeSort,
        'heap':      heapSort
    };

    const INFO = {
        'insertion': { best: 'O(n)',        avg: 'O(n²)',       worst: 'O(n²)',       space: 'O(1)',     desc: 'builds the sorted prefix one element at a time' },
        'selection': { best: 'O(n²)',       avg: 'O(n²)',       worst: 'O(n²)',       space: 'O(1)',     desc: 'repeatedly selects the minimum of the rest' },
        'bubble':    { best: 'O(n)',        avg: 'O(n²)',       worst: 'O(n²)',       space: 'O(1)',     desc: 'swaps adjacent out-of-order pairs' },
        'shell':     { best: 'O(n log n)',  avg: 'O(n⁴ᐟ³)',     worst: 'O(n²)',       space: 'O(1)',     desc: 'insertion sort over decreasing gaps' },
        'quick':     { best: 'O(n log n)',  avg: 'O(n log n)',  worst: 'O(n²)',       space: 'O(log n)', desc: 'partitions around a pivot, divide and conquer' },
        'merge':     { best: 'O(n log n)',  avg: 'O(n log n)',  worst: 'O(n log n)',  space: 'O(n)',     desc: 'recursively merges sorted halves' },
        'heap':      { best: 'O(n log n)',  avg: 'O(n log n)',  worst: 'O(n log n)',  space: 'O(1)',     desc: 'sifts a binary max-heap, extracts the max' }
    };
    // ═══ End algorithms ════════════════════════════════════════════════

    // ═══ Player ════════════════════════════════════════════════════════
    $.ready(() => {
        const chart = $('#chart');
        const sortBt = $('#sort');
        const algoCombo = $('#algo');
        const countCombo = $('#count');
        const speedSlider = $('#speed');
        const cmpCell = $('#m-cmp');
        const movesCell = $('#m-moves');

        Object.keys(ALGOS).forEach(name =>
            algoCombo.add($.create('option', { value: name, text: `${name}Sort` })));

        let values = [];
        let bars = [];
        let timer = null;
        const stats = { cmp: 0, moves: 0 };
        let touched = [];

        // 7 speed steps, halving each time — center (50ms) is the default
        const DELAYS = [500, 200, 100, 50, 25, 10, 5];
        const delay = () => DELAYS[Number(speedSlider.val())];

        const renderHeights = () =>
            bars.forEach((bar, i) => bar.css('height', `${$.scale(values[i], 0, values.length, 4, 100)}%`));

        const updateStats = () => {
            cmpCell.text(stats.cmp);
            movesCell.text(stats.moves);
        };

        const updateInfo = () => {
            const name = algoCombo.val();
            const info = INFO[name];
            $('#desc .name').text(`${name}Sort`);
            $('#desc .text').text(` — ${info.desc}`);
            $('#m-best').text(info.best);
            $('#m-avg').text(info.avg);
            $('#m-worst').text(info.worst);
            $('#m-space').text(info.space);
        };

        const build = () => {
            stop();
            const n = Number(countCombo.val());
            values = [...Array(n).keys()].map(v => v + 1);
            for (let i = n - 1; i > 0; i--) swap(values, i, Math.floor(Math.random() * (i + 1)));

            chart.empty();
            bars = values.map(() => $.create('div', { class: 'bar' }).mount(chart));
            stats.cmp = 0;
            stats.moves = 0;
            renderHeights();
            updateStats();
            updateInfo();
        };

        const mark = (indices, cls) => indices.forEach(i => {
            bars[i].cls(cls);
            touched.push(bars[i]);
        });

        const apply = (step) => {
            touched.forEach(bar => bar.cls('-cmp -swap'));
            touched = [];
            if (step.cmp) { stats.cmp++; mark(step.cmp, 'cmp'); }
            if (step.swap) { stats.moves++; mark(step.swap, 'swap'); renderHeights(); }
            if (step.set) { stats.moves++; mark(step.set, 'swap'); renderHeights(); }
            if (step.lock !== undefined) bars[step.lock].cls('lock');
            updateStats();
        };

        const stop = () => {
            clearTimeout(timer);
            timer = null;
            sortBt.text('Sort');
        };

        const sweep = (i = 0) => {
            if (i >= bars.length) { stop(); return; }
            bars[i].cls('-cmp -swap lock');
            timer = setTimeout(() => sweep(i + 1), 12);
        };

        const play = () => {
            if (timer) { build(); return; }            // running → Stop = reset
            bars.forEach(bar => bar.cls('-cmp -swap -lock'));
            stats.cmp = 0;
            stats.moves = 0;
            sortBt.text('Stop');

            const gen = ALGOS[algoCombo.val()](values);
            const tick = () => {
                const step = gen.next();
                if (step.done) { sweep(); return; }
                apply(step.value);
                timer = setTimeout(tick, delay());
            };
            tick();
        };

        sortBt.on('click', play);
        $('#shuffle').on('click', build);
        countCombo.on('change', build);
        algoCombo.on('change', build);

        build();
    });
    // ═══ End player ════════════════════════════════════════════════════
</script>
</body>
</html>
