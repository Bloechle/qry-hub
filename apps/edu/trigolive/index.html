<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$ trigo.live</title>
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- qry stack (no Shoelace: the page uses no widgets) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry-ui.css">
    <link rel="stylesheet" href="../../../qry-hub-theme.css">
    <script src="https://cdn.jsdelivr.net/gh/Bloechle/qry-js@1.1.0/qry.js"></script>

    <style>
        /* ─── App: trigolive (shared theme: ../../../qry-hub-theme.css) ── */
        :root {
            --cos: var(--qry-blue);
            --sin: #1E8E5A;
            --tan: #E2622B;
        }

        body.hub-app { justify-content: center; }

        #panel { width: min(980px, 100%); padding: 20px; }

        #circle {
            display: block;
            width: 100%;
            aspect-ratio: 720 / 460;
            margin: 0 auto;
            background: var(--qry-bg);
            border: 1px solid var(--qry-line-strong);
            border-radius: var(--qry-radius);
            cursor: grab;
            touch-action: none;
            user-select: none;
        }

        #circle.grabbing { cursor: grabbing; }

        /* SVG elements */
        .axis { stroke: #C7D3E0; stroke-width: 1; }
        .axis-label { font: 13px var(--qry-font-mono); fill: var(--qry-text-muted); }
        .ring { stroke: #93A7BC; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
        .arc { stroke: var(--qry-text-muted); stroke-width: 1.5; fill: none; }
        .square { stroke: var(--qry-text-muted); stroke-width: 1; fill: none; }
        .radius-line { stroke: var(--qry-text-strong); stroke-width: 2; }
        .cos-line { stroke: var(--cos); stroke-width: 4; stroke-linecap: round; }
        .sin-line { stroke: var(--sin); stroke-width: 4; stroke-linecap: round; }
        .tan-line { stroke: var(--tan); stroke-width: 2.5; stroke-dasharray: 6 4; stroke-linecap: round; }
        .dot { fill: var(--qry-text-strong); }
        .svg-label { font: 600 14px var(--qry-font-mono); }
        #angle-label { font: 13px var(--qry-font-mono); fill: var(--qry-text-muted); }

        /* ── Note + metrics: shared via ../../../qry-hub-theme.css ───── */
        #m-cos { color: var(--cos); }
        #m-sin { color: var(--sin); }
        #m-tan { color: var(--tan); }
    </style>
</head>
<body class="hub-app">
<header>
    <h1><span class="prompt">$</span> trigo.live<span class="caret"></span></h1>
    <p>The unit circle — sine, cosine and tangent, live.</p>
</header>

<div id="panel" class="qry-card qry-card-body">
    <svg id="circle" viewBox="-360 -230 720 460" xmlns="http://www.w3.org/2000/svg">
        <line class="axis" x1="-345" y1="0" x2="345" y2="0"/>
        <line class="axis" x1="0" y1="-215" x2="0" y2="215"/>
        <text class="axis-label" x="196" y="-8">1</text>
        <text class="axis-label" x="-212" y="-8">-1</text>
        <text class="axis-label" x="8" y="-198">1</text>
        <text class="axis-label" x="8" y="206">-1</text>
        <circle class="ring" cx="0" cy="0" r="180"/>

        <path id="arc" class="arc"/>
        <path id="square" class="square"/>
        <line id="tan-line" class="tan-line"/>
        <line id="radius-line" class="radius-line" x1="0" y1="0"/>
        <line id="cos-line" class="cos-line" y1="0" y2="0"/>
        <line id="sin-line" class="sin-line"/>
        <circle id="dot" class="dot" r="6"/>

        <text id="cos-label" class="svg-label" fill="var(--cos)" text-anchor="middle">cos</text>
        <text id="sin-label" class="svg-label" fill="var(--sin)">sin</text>
        <text id="tan-label" class="svg-label" fill="var(--tan)" text-anchor="middle">tan</text>
        <text id="angle-label"/>
    </svg>

    <div id="hint" class="note">drag the point — it snaps to remarkable angles</div>

    <div id="metrics">
        <div class="metric"><span class="label">θ</span><span class="value" id="m-deg">—</span></div>
        <div class="metric"><span class="label">radians</span><span class="value" id="m-rad">—</span></div>
        <div class="metric"><span class="label">cos θ</span><span class="value" id="m-cos">—</span></div>
        <div class="metric"><span class="label">sin θ</span><span class="value" id="m-sin">—</span></div>
        <div class="metric"><span class="label">tan θ</span><span class="value" id="m-tan">—</span></div>
    </div>
</div>

<script>
    // ═══ Exact values for remarkable angles ═════════════════════════════
    // Magnitudes keyed by the reference angle to the x-axis (0..90).
    const MAG = { 0: '1', 30: '√3/2', 45: '√2/2', 60: '1/2', 90: '0' };
    const TAN_MAG = { 0: '0', 30: '√3/3', 45: '1', 60: '√3', 90: '∞' };

    function refAngle(deg) {
        const a = deg % 180;
        return Math.min(a, 180 - a);
    }

    function isRemarkable(deg) {
        return deg % 15 === 0 && [0, 30, 45, 60].includes(deg % 90);
    }

    function signed(mag, value) {
        return (mag === '0' || mag === '∞' || value >= 0) ? mag : `-${mag}`;
    }

    function radLabel(deg) {
        if (deg === 0) return '0';
        const gcd = (a, b) => b ? gcd(b, a % b) : a;
        const g = gcd(deg, 180);
        const n = deg / g;
        const d = 180 / g;
        const num = n === 1 ? 'π' : `${n}π`;
        return d === 1 ? num : `${num}/${d}`;
    }

    // ═══ Unit circle ════════════════════════════════════════════════════
    $.ready(() => {
        const R = 180;
        const VIEW_W = 720;                     // viewBox dimensions
        const VIEW_H = 460;
        const svg = $('#circle');

        let deg = 30;                           // canonical angle in degrees [0, 360)

        const render = () => {
            const rad = deg * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);
            const x = cos * R;
            const y = -sin * R;                 // SVG y-axis is inverted

            // Geometry
            $('#dot').attr({ cx: x, cy: y });
            $('#radius-line').attr({ x2: x, y2: y });
            $('#cos-line').attr({ x1: 0, x2: x });
            $('#sin-line').attr({ x1: x, y1: 0, x2: x, y2: y });

            // Tangent segment: from the point to the x-axis intercept (length |tan θ|)
            if (Math.abs(cos) > 1e-9) {
                $('#tan-line').attr({ x1: x, y1: y, x2: R / cos, y2: 0 });
            } else {
                $('#tan-line').attr({ x1: x, y1: y, x2: x, y2: y });
            }

            // Angle arc (from 0 to θ, counterclockwise)
            const arcR = 28;
            const ax = Math.cos(rad) * arcR;
            const ay = -Math.sin(rad) * arcR;
            $('#arc').attr('d', deg === 0 ? '' :
                `M ${arcR} 0 A ${arcR} ${arcR} 0 ${deg > 180 ? 1 : 0} 0 ${ax} ${ay}`);

            // Right-angle marker at the foot of the sine line
            const s = 11;
            const sx = -Math.sign(cos) * s;     // square opens toward the origin
            const sy = -Math.sign(sin) * s;
            $('#square').attr('d', (Math.abs(cos) < .03 || Math.abs(sin) < .03) ? '' :
                `M ${x + sx} 0 L ${x + sx} ${sy} L ${x} ${sy}`);

            // SVG labels
            $('#cos-label').attr({ x: x / 2, y: -Math.sign(sin || 1) * -20 + 5 });
            $('#sin-label').attr({ x: x + Math.sign(cos || 1) * 10 - (cos < 0 ? 38 : 0), y: y / 2 + 5 });
            const tanMid = (x + (Math.abs(cos) > 1e-9 ? R / cos : x)) / 2;
            $('#tan-label').attr({ x: tanMid, y: y / 2 - 12 });
            $('#angle-label').attr({ x: 38, y: deg > 180 ? 20 : -12 }).text(`θ = ${Math.round(deg)}°`);

            // Metrics: exact values on remarkable angles, decimals otherwise
            if (isRemarkable(deg)) {
                const ref = refAngle(deg);
                $('#m-deg').text(`${deg}°`);
                $('#m-rad').text(radLabel(deg));
                $('#m-cos').text(signed(MAG[ref], cos));
                $('#m-sin').text(signed(MAG[90 - ref], sin));
                $('#m-tan').text(Math.abs(cos) < 1e-9 ? '∞' : signed(TAN_MAG[ref], sin / cos));
            } else {
                $('#m-deg').text(`${deg.toFixed(1)}°`);
                $('#m-rad').text(rad.toFixed(2));
                $('#m-cos').text(cos.toFixed(2));
                $('#m-sin').text(sin.toFixed(2));
                $('#m-tan').text(Math.abs(cos) < .01 ? '±∞' : (sin / cos).toFixed(2));
            }
        };

        // ── Dragging (pointer events: mouse, touch and pen unified) ──
        let dragging = false;

        const drag = (e) => {
            const rect = svg.getBoundingClientRect();
            const vx = (e.clientX - rect.left) / rect.width * VIEW_W - VIEW_W / 2;
            const vy = (e.clientY - rect.top) / rect.height * VIEW_H - VIEW_H / 2;
            deg = (Math.atan2(-vy, vx) * 180 / Math.PI + 360) % 360;

            // Snap to multiples of 15° when close
            const snapped = Math.round(deg / 15) * 15 % 360;
            const dist = Math.abs(deg - snapped);
            if (Math.min(dist, 360 - dist) < 2) deg = snapped;

            render();
        };

        svg.on('pointerdown', e => {
            svg.setPointerCapture(e.pointerId);
            dragging = true;
            svg.cls('grabbing');
            drag(e);
        });
        svg.on('pointermove', e => dragging && drag(e));
        svg.on('pointerup', () => {
            dragging = false;
            svg.cls('-grabbing');
        });

        render();
    });
</script>
</body>
</html>
